<!-- ==================== АДМИН-МОДАЛКИ ==================== -->

<!-- МОДАЛЬНОЕ ОКНО: СПИСОК ПОЛЬЗОВАТЕЛЕЙ ДЛЯ АДМИНА (исправленная) -->
<div id="adminUsersModal" class="modal">
    <div class="modal-content" style="max-width: 1200px; width: 95%; max-height: 90vh; display: flex; flex-direction: column;">
        <button class="close" onclick="closeModal('adminUsersModal')">×</button>
        <h2 style="margin-bottom: 20px; font-size: 24px; flex-shrink: 0;">Управление пользователями</h2>

        <!-- Фильтры (фиксированные) -->
        <div style="flex-shrink: 0; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px;">
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div style="flex: 2; min-width: 250px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500; font-size: 13px;">Поиск</label>
                    <input type="text" id="adminUserSearch" placeholder="Email или имя"
                           style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                </div>
                <div style="flex: 1; min-width: 180px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500; font-size: 13px;">Тип</label>
                    <select id="adminUserType" style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                        <option value="">Все типы</option>
                        <option value="tenant">Арендатор</option>
                        <option value="owner">Собственник</option>
                        <option value="agent">Агент</option>
                        <option value="admin">Администратор</option>
                    </select>
                </div>
                <div style="display: flex; align-items: flex-end; gap: 10px;">
                    <button class="btn-primary" onclick="loadAdminUsers(1)" style="padding: 10px 25px; height: 42px;">Найти</button>
                    <button class="btn-secondary" onclick="resetAdminUserFilters()" style="padding: 10px 25px; height: 42px;">Сбросить</button>
                </div>
            </div>
        </div>

        <!-- Таблица пользователей с прокруткой только внутри таблицы -->
        <div style="flex: 1; overflow-y: auto; border: 1px solid #e9ecef; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); min-height: 0;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead style="background: linear-gradient(135deg, #f8f9fa, #e9ecef); position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">ID</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">Аватар</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">Имя</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">Email</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">Тип</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">Статус</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">Дата регистрации</th>
                        <th style="padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; color: #495057;">Действия</th>
                    </tr>
                </thead>
                <tbody id="adminUsersTableBody">
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 60px; color: #6c757d; font-size: 16px;">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Пагинация (фиксированная) -->
        <div class="pagination" id="adminUsersPagination" style="flex-shrink: 0; margin-top: 20px; justify-content: center;"></div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО: ПРОСМОТР ДЕТАЛЕЙ ПОЛЬЗОВАТЕЛЯ (без прокрутки) -->
<div id="adminUserDetailModal" class="modal">
    <div class="modal-content" style="max-width: 600px; width: 90%;">
        <button class="close" onclick="closeModal('adminUserDetailModal')">×</button>
        <h2 style="margin-bottom: 20px; font-size: 24px; padding-right: 30px;">Детали пользователя</h2>

        <!-- Контент без прокрутки -->
        <div id="adminUserDetailContent" style="margin-bottom: 20px;"></div>

        <!-- Кнопка блокировки/разблокировки -->
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
            <button class="btn-info" id="adminUserDetailAgentBtn" style="padding: 12px 20px; min-width: 180px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">👤 Назначить агентом</button>
            <button class="btn-warning" id="adminUserDetailBlockBtn" style="padding: 12px 20px; min-width: 180px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">🔒 Заблокировать</button>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО: ПРОСМОТР ДЕТАЛЕЙ ОБЪЕКТА ДЛЯ АДМИНА -->
<div id="adminPropertyModal" class="modal">
    <div class="modal-content" style="max-width: 700px; width: 90%;">
        <button class="close" onclick="closeModal('adminPropertyModal')">×</button>
        <h2 style="margin-bottom: 20px; font-size: 24px;" id="adminPropertyTitle">Просмотр объекта</h2>

        <div id="adminPropertyContent" style="max-height: 500px; overflow-y: auto; padding-right: 10px;">
            <!-- Загружается динамически -->
        </div>

        <!-- Кнопки действий -->
        <div style="display: flex; gap: 12px; margin-top: 25px;">
            <button class="btn-secondary" onclick="closeModal('adminPropertyModal')" style="flex: 1; padding: 12px; font-size: 15px;">Закрыть</button>
            <button class="btn-warning" onclick="editProperty(currentPropertyId)" style="flex: 1; padding: 12px; font-size: 15px; background: #ffc107; color: #212529; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">✎ Изменить</button>
            <button class="btn-danger" onclick="adminDeleteProperty(currentPropertyId)" style="flex: 1; padding: 12px; font-size: 15px; background: #dc3545; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">🗑 Удалить</button>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО: БЛОКИРОВКА ПОЛЬЗОВАТЕЛЯ -->
<div id="blockUserModal" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <button class="close" onclick="closeModal('blockUserModal')">×</button>
        <h2>Блокировка пользователя</h2>

        <div id="blockUserInfo" style="margin-bottom: 20px;">
            <p><strong>Пользователь:</strong> <span id="blockUserName"></span></p>
            <p><strong>Email:</strong> <span id="blockUserEmail"></span></p>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label>Причина блокировки *</label>
            <select id="blockReason" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                <option value="fraud">Мошеннические действия</option>
                <option value="spam">Рассылк� спама</option>
                <option value="fake_property">Размещение фальшивых объектов</option>
                <option value="harassment">Оскорбления и домогательства</option>
                <option value="documents">Подделка документов</option>
                <option value="multiple_accounts">Создание нескольких аккаунтов</option>
                <option value="other">Другое нарушение</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label>Срок блокировки</label>
            <select id="blockDuration" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                <option value="7">7 дней</option>
                <option value="30">30 дней</option>
                <option value="permanent">Навсегда</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label>Комментарий для пользователя (будет отправлен на email)</label>
            <textarea id="blockComment" rows="3" class="form-control"
                      style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; resize: vertical;"
                      placeholder="Поясните причину блокировки..."></textarea>
        </div>

        <div class="modal-actions" style="display: flex; gap: 12px; margin-top: 20px;">
            <button class="btn-secondary" onclick="closeModal('blockUserModal')" style="flex: 1; padding: 12px;">Отмена</button>
            <button class="btn-danger" onclick="confirmBlockUser()" style="flex: 1; padding: 12px;">Заблокировать</button>
        </div>
    </div>
</div>
